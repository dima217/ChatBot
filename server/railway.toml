# Railway: set this service Root Directory to `server`, then deploy.
# Nixpacks runs npm install + npm run build by default; start uses package.json "start".

[build]
builder = "nixpacks"

[deploy]
# Monorepo root: use workspace start (root package.json has no plain "npm start").
startCommand = "npm run start:server"
healthcheckPath = "/health"
healthcheckTimeout = 30
